# docs: https://docs.github.com/en/actions/reference/workflow-syntax-for-github-actions

name: Publish all npm packages

on:
  workflow_dispatch:

permissions: { }

env:
  PACKAGES_DIR: packages
  NODE_ACTIVE_LTS: "24"  # https://nodejs.org/en/about/releases/

jobs:
  discover:
    name: discover packages
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      packages: ${{ steps.set-matrix.outputs.packages }}
    steps:
      - name: Checkout repository
        # see https://github.com/actions/checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false
      - name: Collect package directories
        id: set-matrix
        run: |
          set -u
          pkgs=$(find "$PACKAGES_DIR" -mindepth 1 -maxdepth 1 -type d -print0 \
            | jq -R -s -c 'split("\u0000") | map(select(length>0))')
          echo "packages=$pkgs" >> "$GITHUB_OUTPUT"
  publish:
    needs: discover
    name: publish ${{ matrix.pkg }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      id-token: write  # Enables provenance signing via OIDC
    strategy:
      fail-fast: false
      matrix:
        pkg: ${{ fromJson(needs.discover.outputs.packages) }}
    steps:
      - name: Checkout repository
        # see https://github.com/actions/checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false
      - name: Set up Node.js
        # see https://github.com/actions/setup-node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: ${{ env.NODE_ACTIVE_LTS }}
          package-manager-cache: false
      - name: Install npm CLI dependencies
        run: | # zizmor: ignore[adhoc-packages]
          npm install -g npm@latest
      - name: Publish package
        working-directory: ${{ matrix.pkg }}
        run: >
          npm publish
          --provenance
          --access public
          || echo "Failed publish (maybe already published)"
